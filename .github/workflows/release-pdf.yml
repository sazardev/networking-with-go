name: Build and Release PDF

# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`),
# which both builds the book and publishes it as a versioned GitHub Release
# with the PDF attached. Can also be run manually (workflow_dispatch) to test
# the build without cutting a release.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      # v0.8.0 is a tagged release that includes the "data:...;base64,..."
      # navigation bug fix (https://github.com/sazardev/go-pretty-pdf/pull/7,
      # previously only available by pinning to a raw commit -- see git
      # history for that workaround) plus the --cover-image/epub support
      # this workflow now depends on.
      - name: Install pretty-pdf
        run: go install github.com/sazardev/go-pretty-pdf/cmd/pretty-pdf@v0.8.0

      - name: Validate chapters
        run: pretty-pdf check

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PDF
        run: pretty-pdf build

      - name: Build EPUB
        run: pretty-pdf epub --out networking-with-go.epub

      - name: Rename PDF with version
        run: mv networking-with-go.pdf "networking-with-go-${{ steps.version.outputs.version }}.pdf"

      - name: Rename EPUB with version
        run: mv networking-with-go.epub "networking-with-go-${{ steps.version.outputs.version }}.epub"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: networking-with-go-${{ steps.version.outputs.version }}
          path: |
            networking-with-go-*.pdf
            networking-with-go-*.epub
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            networking-with-go-*.pdf \
            networking-with-go-*.epub \
            --title "Networking with Go - The Easy Way Guide ${{ github.ref_name }}" \
            --generate-notes
